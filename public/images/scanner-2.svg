<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <!-- Handheld Scanner -->
  <rect x="300" y="200" width="200" height="250" fill="#2d3748" rx="15"/>
  <rect x="320" y="180" width="160" height="40" fill="#4a5568" rx="5"/>
  <!-- Scanning Window -->
  <rect x="340" y="280" width="120" height="80" fill="#1a202c" rx="5"/>
  <circle cx="400" cy="320" r="30" fill="none" stroke="#d32f2f" stroke-width="3" opacity="0.5"/>
  <!-- Text -->
  <text x="400" y="350" font-family="Arial" font-size="28" font-weight="bold" fill="#2d3748" text-anchor="middle">Портативный</text>
  <text x="400" y="380" font-family="Arial" font-size="18" fill="#4a5568" text-anchor="middle">3D Сканер</text>
</svg>

