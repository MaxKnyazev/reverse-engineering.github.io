<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- 3D Printer Body -->
  <rect x="200" y="200" width="400" height="300" fill="#2d3748" rx="5"/>
  <rect x="220" y="180" width="360" height="40" fill="#4a5568" rx="3"/>
  <!-- Build Plate -->
  <rect x="250" y="450" width="300" height="30" fill="#718096" rx="2"/>
  <!-- Extruder -->
  <circle cx="400" cy="250" r="25" fill="#d32f2f" opacity="0.8"/>
  <rect x="390" y="240" width="20" height="20" fill="#fff" opacity="0.3"/>
  <!-- Text -->
  <text x="400" y="320" font-family="Arial" font-size="32" font-weight="bold" fill="#2d3748" text-anchor="middle">3D Принтер</text>
  <text x="400" y="360" font-family="Arial" font-size="18" fill="#4a5568" text-anchor="middle">Промышленный FDM</text>
</svg>

