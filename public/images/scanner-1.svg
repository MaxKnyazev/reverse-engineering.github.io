<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <!-- Scanner Base -->
  <rect x="250" y="250" width="300" height="200" fill="#2d3748" rx="10"/>
  <!-- Scanning Area -->
  <circle cx="400" cy="350" r="80" fill="none" stroke="#4a5568" stroke-width="4"/>
  <circle cx="400" cy="350" r="50" fill="none" stroke="#4a5568" stroke-width="4"/>
  <line x1="400" y1="170" x2="400" y2="530" stroke="#4a5568" stroke-width="4"/>
  <!-- Laser Lines -->
  <line x1="320" y1="350" x2="480" y2="350" stroke="#d32f2f" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="270" x2="400" y2="430" stroke="#d32f2f" stroke-width="2" opacity="0.6"/>
  <!-- Text -->
  <text x="400" y="300" font-family="Arial" font-size="32" font-weight="bold" fill="#2d3748" text-anchor="middle">3D Сканер</text>
  <text x="400" y="330" font-family="Arial" font-size="18" fill="#4a5568" text-anchor="middle">Промышленный</text>
</svg>

